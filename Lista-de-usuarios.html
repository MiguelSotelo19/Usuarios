<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de usuarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        #usuarios {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .usuario-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            width: 250px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .usuario-card:hover {
            transform: translateY(-5px);
        }

        .usuario-card img {
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .usuario-card ul {
            list-style: none;
            padding: 0;
        }

        .usuario-card li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Lista de usuarios</h1>

    <div id="usuarios"></div>

    <script>
        const consutarLista = async () => {
            await fetch('https://reqres.in/api/users?page=1', {
                headers: {
                    "x-api-key": "reqres-free-v1"
                }
            })
            .then(response => {
                if(!response.ok) {
                    throw new Error('No se pudo obtener la información')
                }
                return response.json();
            })
            .then(resJson => {
                const usuarios = resJson.data;
                const div = document.getElementById("usuarios");

                for(let i=0; i<usuarios.length; i++){
                    let usuario = usuarios[i];
                    console.log(usuario);

                    let container = `
                        <div class="usuario-card">
                            <img src='${usuario.avatar}' width='80' height='80' alt='Avatar de ${usuario.first_name}' />
                            <ul>
                                <li><strong>Nombre:</strong> ${usuario.first_name} ${usuario.last_name}</li>
                                <li><strong>Correo:</strong> ${usuario.email}</li>
                            </ul>
                            <a href="./Detalles-usuario.html?id=${usuario.id}"><button>Detalles</button></a>
                        </div>
                    `;
                    
                    div.innerHTML += container;
                }
            })
            .catch(error => {
                console.error(error);
                document.getElementById("usuarios").innerHTML = "<p>Error al cargar los usuarios.</p>";
            });
        }

        consutarLista();
    </script>
</body>
</html>
