<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Form</title>
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Cambiado a columna */
            justify-content: flex-start; /* Empezar desde arriba */
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            padding: 30px 0; /* Un poco de espacio arriba y abajo */
            margin: 0;
        }

        /* Contenedor principal para controlar el ancho */
        .container-main {
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
        }

        .navbar {
            background-color: #3498db;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            gap: 20px; /* espacio entre enlaces */
            flex-wrap: wrap; /* que los links bajen si no caben */
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

        .navbar a:hover {
            background-color: #2980b9;
        }

        .form-container {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .form-label {
            font-weight: 600;
            color: #444;
        }

        .btn-primary {
            background: #2575fc;
            border: none;
            transition: background-color 0.3s ease;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 5px 10px rgba(37, 117, 252, 0.5);
        }

        .btn-primary:hover {
            background: #1a53c8;
            box-shadow: 0 6px 15px rgba(26, 83, 200, 0.7);
        }

        #responseMessage {
            max-width: 420px;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container-main">
        <nav class="navbar">
            <a href="Lista-de-usuarios.html">Lista de Usuarios</a>
            <a href="lista-recurso.html">Lista de Recursos</a>
            <a href="Random.html">Usuario Aleatorio</a>
            <a href="createUser.html">Crear Usuario</a>
        </nav>

        <div class="form-container shadow">
            <h2 class="mb-4 text-center">Create User</h2>
            <form id="myForm" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" required placeholder="Your name" />
                    <div class="invalid-feedback">Please enter your name.</div>
                </div>

                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp" required
                        placeholder="name@example.com" />
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    <div class="invalid-feedback">Please enter a valid email.</div>
                </div>

                <div class="mb-4">
                    <label for="avatar" class="form-label">Avatar URL</label>
                    <input type="url" class="form-control" id="avatar" placeholder="https://example.com/avatar.jpg" />
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>

        <div id="responseMessage"></div>
    </div>

    <script>
        const form = document.getElementById('myForm');
        const responseMessage = document.getElementById('responseMessage');

        // Bootstrap validation styles
        form.addEventListener('submit', function (event) {
            event.preventDefault();
            event.stopPropagation();

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            const data = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('inputEmail').value.trim(),
                avatar: document.getElementById('avatar').value.trim()
            };

            fetch("https://reqres.in/api/users", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": "reqres-free-v1"
                },
                body: JSON.stringify(data)
            })
                .then(res => {
                    if (!res.ok) throw new Error(`Error HTTP: ${res.status}`);
                    return res.json();
                })
                .then(response => {
                    console.log("Success:", response);
                    responseMessage.innerHTML = `<div class="alert alert-success">Usuario creado con ID: ${response.id}</div>`;
                    form.reset();
                    form.classList.remove('was-validated');
                })
                .catch(error => {
                    console.error("Error:", error);
                    responseMessage.innerHTML = `<div class="alert alert-danger">Error al enviar datos</div>`;
                });
        });
    </script>
</body>

</html>
