<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario Aleatorio</title>

<style>
   body {
    margin: 0;
    background-color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
}

.main-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px); /* resto del height del navbar */
}


    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 25%;
        height: auto;
        min-height: 350px;
        border-radius: 5%;
        box-shadow: -12px -8px 15px 5px rgba(0,0,0,0.1),0px 10px 15px -3px rgba(0,0,0,0.1),0px 10px 15px -3px rgba(0,0,0,0.1);
        font-family: Arial, Helvetica, sans-serif;
        gap: 10px;
        background-color: white;
        padding: 20px;
    }

    .tittle {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
        margin-bottom: 20px;
    }

    img {
        margin-top: 5px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
    }

   .navbar {
    background-color: #3498db;
    padding: 10px 20px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 30px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}
    .navbar a {
        color: #fff;
        text-decoration: none;
        margin: 0 15px;
        font-weight: bold;
        padding: 8px 12px;
        border-radius: 4px;
        transition: background-color 0.3s;
    }

    .navbar a:hover {
        background-color: #2980b9;
    }
</style>

</head>
<body>
    <nav class="navbar">
        <a href="Lista-de-usuarios.html">Lista de Usuarios</a>
        <a href="lista-recurso.html">Lista de Recursos</a>
        <a href="Random.html">Usuario Aleatorio</a>
        <a href="createUser.html">Crear Usuario</a>
    </nav>

    <div class="main-content">
            <div class="tittle">
        <h1>Usuario Aleatorio:</h1>
    </div>

    <div class="container"></div>
    </div>



<script>
const usuarioAleatorio = async (id) => {
    const url = 'https://reqres.in/api/users';

    try {
        const response = await fetch(`${url}/${id}`);

        if (!response.ok) {
            console.log(response.status);
        }

        const json = await response.json();
        console.log(json);

        const container = document.querySelector('.container');
        const user = json.data;
        container.innerHTML = `
            <h2>Nombre del usuario:</h2>
            <h2>${user.first_name} ${user.last_name}</h2>
            <img src="${user.avatar}" alt="Avatar of ${user.first_name}">
        `;

    } catch (error) {
        console.error(error);
    }
};

const id = Math.floor(Math.random() * (12 - 1 + 1)) + 1;
console.log(id);

usuarioAleatorio(id);
</script>
</body>
</html>
